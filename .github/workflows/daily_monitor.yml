name: QQQ Liquidity Daily Monitor

on:
  schedule:
    # 21:30 UTC = 17:30 EDT / 16:30 EST (确保美股收盘且数据提供商已更新)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Create .env file from Secrets
        # 从 GitHub Secrets 中读取变量并存入 .env 供应给 Docker
        run: |
          echo "FRED_API_KEY=${{ secrets.FRED_API_KEY }}" >> .env
          echo "ALERT_WEBHOOK_URL=${{ secrets.ALERT_WEBHOOK_URL }}" >> .env
          echo "VERCEL_BLOB_READ_WRITE_TOKEN=${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}" >> .env
          
      - name: Execute Daily Monitor via Docker
        # 强制使用 Docker 环境保持底层物理隔离
        run: |
          docker compose run --rm test python scripts/run_daily_cron.py
