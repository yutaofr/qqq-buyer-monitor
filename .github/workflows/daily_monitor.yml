name: QQQ Liquidity Daily Monitor

on:
  schedule:
    # 21:30 UTC = 17:30 EDT / 16:30 EST (确保美股收盘且数据提供商已更新)
    - cron: '30 21 * * 1-5'
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Create .env file from Secrets
        # 将从 GitHub Secrets 中读取 Discord Webhook URL 并传递给容器环境
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          
      - name: Execute Daily Monitor via Docker
        # 强制使用 Docker 环境保持底层物理隔离
        run: |
          docker compose run --rm --env-file .env test python scripts/run_daily_cron.py
