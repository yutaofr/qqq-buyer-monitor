name: CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Build v13.7 Production Image
        run: |
          docker build -t qqq-monitor:v13.7-ci .

      - name: Lint Codebase (Ruff)
        run: |
          docker run --rm qqq-monitor:v13.7-ci ruff check .

      - name: Run Full Test Suite (v13.7-ULTIMA)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          docker run --rm \
            -e FRED_API_KEY=$FRED_API_KEY \
            qqq-monitor:v13.7-ci pytest tests -q

      - name: Run ULTIMA Structural Audit
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          docker run --rm \
            -e FRED_API_KEY=$FRED_API_KEY \
            qqq-monitor:v13.7-ci python scripts/verify_v13_4_hydration.py

      - name: Upload v13.7 Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: v13-7-audit-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            artifacts/v13_audit/
            artifacts/v12_audit/
