name: CI

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint Codebase
        run: |
          ruff check .

      - name: Run Test Suite
        run: |
          pytest tests -q

      - name: Run Audit Backtest
        run: |
          python -m src.backtest

      - name: Upload Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            artifacts/v11_5_acceptance/v11_5_probabilistic_audit.png
            artifacts/v11_5_acceptance/v11_5_target_beta_fidelity.png
