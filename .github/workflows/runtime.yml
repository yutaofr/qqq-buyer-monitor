name: Runtime Base

on:
  workflow_call:
    inputs:
      job_name:
        required: true
        type: string
      command:
        required: true
        type: string
      timeout_minutes:
        required: false
        default: 30
        type: number
    secrets:
      ALERT_WEBHOOK_URL:
        required: false
      FRED_API_KEY:
        required: false
      VERCEL_BLOB_READ_WRITE_TOKEN:
        required: false

jobs:
  run:
    name: ${{ inputs.job_name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Set up Production Environment (Docker)
        run: |
          docker build -t qqq-monitor:latest .

      - name: Execute Runtime (v13.7-ULTIMA)
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          VERCEL_BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}
          # v13.7-ULTIMA Mandatory Prior Anchoring
          PRIOR_STATE_PATH: "data/v13_6_ex_hydrated_prior.json"
          ULTIMA_MODE: "GOLD-FINAL"
        run: |
          docker run --rm \
            -e ALERT_WEBHOOK_URL=$ALERT_WEBHOOK_URL \
            -e FRED_API_KEY=$FRED_API_KEY \
            -e VERCEL_BLOB_READ_WRITE_TOKEN=$VERCEL_BLOB_READ_WRITE_TOKEN \
            -e PRIOR_STATE_PATH=$PRIOR_STATE_PATH \
            -e ULTIMA_MODE=$ULTIMA_MODE \
            -v $(pwd)/artifacts:/app/artifacts \
            qqq-monitor:latest ${{ inputs.command }}

      - name: Notify on Failure
        if: failure()
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "${ALERT_WEBHOOK_URL}" ]; then
            echo "ALERT_WEBHOOK_URL is not configured; skipping failure notification."
            exit 0
          fi
          curl -sS -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"🚨 **v13.7-ULTIMA Runtime Failure**\n**Workflow:** ${{ github.workflow }}\n**Job:** ${{ inputs.job_name }}\n**Ref:** ${{ github.ref_name }}\"}" \
            "${ALERT_WEBHOOK_URL}"
