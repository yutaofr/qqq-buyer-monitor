name: Deploy Web Dashboard Snapshot

on:
  schedule:
    # AVOID TOP-OF-THE-HOUR CONGESTION: Trigger at 13th minute, Monday to Friday
    - cron: '13 * * * 1-5'
  workflow_dispatch:

# CONCURRENCY MUFFLING: Prevent dirty writes by canceling previous runs
concurrency:
  group: deploy-blob
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/v11-runtime.yml
    with:
      job_name: Deploy Web Dashboard Snapshot
      command: python -m src.main --engine v11 --export-web
      timeout_minutes: 30
    secrets: inherit
