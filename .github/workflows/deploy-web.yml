name: Deploy Web Dashboard Snapshot

on:
  schedule:
    # 22:30 UTC = 18:30 EDT (Summer) / 17:30 EST (Winter).
    # Trigger after US market close and daily settlement.
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

# CONCURRENCY MUFFLING: Prevent dirty writes by canceling previous runs
concurrency:
  group: deploy-blob
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/runtime.yml
    with:
      job_name: Deploy Web Dashboard Snapshot
      command: python -m src.main
      timeout_minutes: 30
    secrets: inherit
