name: Deploy Web Dashboard Snapshot

on:
  schedule:
    # Every hour on the hour, Monday to Friday (UTC)
    - cron: '0 * * * 1-5'
  workflow_dispatch: # Allow manual trigger

# CONCURRENCY MUFFLING: Prevent dirty writes by canceling previous runs
concurrency:
  group: deploy-blob
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install .
          # Ensure calendar library is installed (explicitly for safety)
          pip install pandas_market_calendars pytz requests

      - name: Run Engine & Export Snapshot
        env:
          VERCEL_BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          # Force export mode
          EXPORT_WEB: "1"
          GITHUB_ACTIONS: "true"
        run: |
          # Run the main pipeline with web export enabled
          python -m src.main --export-web --no-save

      - name: Notify on Failure
        if: failure()
        run: |
          # Send OOB Alert to Telegram/Discord via Webhook
          curl -X POST -H "Content-Type: application/json" \
               -d "{\"text\": \"🚨 QQQ-Monitor Pipeline FAILED. Run ID: ${{ github.run_id }}. Check logs immediately.\"}" \
               ${{ secrets.ALERT_WEBHOOK_URL }}
