name: Discord Daily Signal (17:17 Paris)

on:
  schedule:
    # 1. Beijing 14:47 (CST, UTC+8) -> 06:47 UTC
    - cron: '47 06 * * 1-5'
    
    # 2. Paris 17:17 (CET/CEST) -> 15:17 or 16:17 UTC
    - cron: '17 15,16 * * 1-5'
  workflow_dispatch:

# CONCURRENCY CONTROL: Prevent overlapping notifications
concurrency:
  group: discord-signal
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install .
          pip install pytz requests

      - name: Check Target Time Window
        id: check
        shell: python
        run: |
          import os
          import pytz
          from datetime import datetime

          # Timezones
          paris_tz = pytz.timezone('Europe/Paris')
          beijing_tz = pytz.timezone('Asia/Shanghai')
          
          now_paris = datetime.now(paris_tz)
          now_beijing = datetime.now(beijing_tz)
          
          is_dispatch = os.environ.get('EVENT_NAME') == 'workflow_dispatch'
          
          # Target 1: 17:17 Paris (allowing window 17:10-17:35)
          is_paris_target = (now_paris.hour == 17 and 10 <= now_paris.minute <= 35)
          
          # Target 2: 14:47 Beijing (allowing window 14:40-15:00)
          is_beijing_target = (now_beijing.hour == 14 and 40 <= now_beijing.minute <= 59)
          
          should_run = "true" if (is_paris_target or is_beijing_target or is_dispatch) else "false"
          
          print(f"Current Paris Time: {now_paris.strftime('%H:%M:%S')}")
          print(f"Current Beijing Time: {now_beijing.strftime('%H:%M:%S')}")
          print(f"Event Name: {os.environ.get('EVENT_NAME')}")
          print(f"Should Run: {should_run}")
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"should_run={should_run}\n")
        env:
          EVENT_NAME: ${{ github.event_name }}

      - name: Execute Signal & Notify Discord
        if: steps.check.outputs.should_run == 'true'
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GITHUB_ACTIONS: "true"
        run: |
          # Run the engine with the notify-discord flag. 
          # --no-save is critical to avoid polluting historical data with 17:17 snapshots 
          # if the hourly cron also captures a valid EOD/Intraday state.
          python -m src.main --engine v11 --notify-discord --no-save

        - name: Notify on Failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
               -d "{\"content\": \"🚨 **Discord Signal Push Failed (v11)** \n**Run ID:** ${{ github.run_id }} \n**Check logs for v11 Bayesian pipeline errors.**\"}" \
               ${{ secrets.ALERT_WEBHOOK_URL }}

