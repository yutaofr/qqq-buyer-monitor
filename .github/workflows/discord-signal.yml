name: Discord Daily Signal (17:17 Paris)

on:
  schedule:
    # 1. Beijing 14:47 (CST, UTC+8) -> 06:47 UTC
    - cron: '47 06 * * 1-5'
    
    # 2. Paris 17:17 (CET/CEST) -> 15:17 or 16:17 UTC
    - cron: '17 15,16 * * 1-5'
  workflow_dispatch:

# CONCURRENCY CONTROL: Prevent overlapping notifications
concurrency:
  group: discord-signal
  cancel-in-progress: true

jobs:
  check-window:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    permissions:
      contents: read
    steps:
      - name: Check Target Time Window
        id: check
        shell: python
        run: |
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now_paris = datetime.now(ZoneInfo("Europe/Paris"))
          now_beijing = datetime.now(ZoneInfo("Asia/Shanghai"))

          is_dispatch = os.environ.get('EVENT_NAME') == 'workflow_dispatch'

          # Target 1: 17:17 Paris (allowing window 17:10-17:35)
          is_paris_target = (now_paris.hour == 17 and 10 <= now_paris.minute <= 35)

          # Target 2: 14:47 Beijing (allowing window 14:40-15:00)
          is_beijing_target = (now_beijing.hour == 14 and 40 <= now_beijing.minute <= 59)

          should_run = "true" if (is_paris_target or is_beijing_target or is_dispatch) else "false"

          print(f"Current Paris Time: {now_paris.strftime('%H:%M:%S')}")
          print(f"Current Beijing Time: {now_beijing.strftime('%H:%M:%S')}")
          print(f"Event Name: {os.environ.get('EVENT_NAME')}")
          print(f"Should Run: {should_run}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"should_run={should_run}\n")
        env:
          EVENT_NAME: ${{ github.event_name }}

  notify:
    needs: check-window
    if: needs.check-window.outputs.should_run == 'true'
    uses: ./.github/workflows/runtime.yml
    with:
      job_name: Discord Daily Signal
      command: python -m src.main
      timeout_minutes: 30
    secrets: inherit
