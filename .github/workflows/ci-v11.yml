name: CI V11

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:

concurrency:
  group: ci-v11-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint Current Production Boundary
        run: |
          ruff check \
            src/main.py \
            src/backtest.py \
            src/output/discord_notifier.py \
            src/output/backtest_plots.py \
            src/engine/v11 \
            tests/unit/engine/v11 \
            tests/unit/test_discord_notifier.py \
            tests/unit/test_backtest_v11.py \
            tests/unit/test_main_v11.py \
            tests/integration/engine/v11

      - name: Run V11 Test Suite
        run: |
          pytest tests/unit/engine/v11 -q \
            tests/unit/test_discord_notifier.py \
            tests/unit/test_backtest_v11.py \
            tests/unit/test_main_v11.py \
            tests/integration/engine/v11/test_v11_workflow.py -q

      - name: Run V11 Audit Backtest
        run: |
          python -m src.backtest --mode v11

      - name: Upload V11 Audit Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v11-audit-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            artifacts/v11_5_acceptance/v11_5_probabilistic_audit.png
            artifacts/v11_5_acceptance/v11_5_target_beta_fidelity.png
