
services:
  app:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    environment:
      - QQQ_DB_PATH=/app/data/signals.db
      - PYTHONPATH=/app
    env_file:
      - .env
    command: python -m src.main

  test:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - .env:/app/.env
    environment:
      - QQQ_DB_PATH=/tmp/test_signals.db
      - PYTHONPATH=/app
    env_file:
      - .env
    command: pytest tests/ -v --tb=short

  backtest:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: python -m src.backtest

  metrics:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: python scripts/v14_expert_metrics.py

  verification:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: python scripts/verify_alignment.py

  audit-bayesian:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: python scripts/audit_bayesian_regime_lock.py

  v14-audit:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: >
      sh -c "python scripts/run_v14_panorama_matrix.py && 
             python scripts/run_worldview_backtest_audit.py"

  forensic:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: python tests/forensic/test_pit_leakage.py

  ortho-audit:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: python scripts/forensic_ortho_audit.py

  kelly-ab:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: >
      python scripts/kelly_ab_comparison.py
      --trace-path artifacts/v14_panorama/mainline/regime_process_trace.csv
      --regime-audit src/engine/v11/resources/regime_audit.json
      --output-dir artifacts/kelly_ab

  kelly-pnl:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - .env:/app/.env
    env_file:
      - .env
    command: >
      python scripts/kelly_pnl_backtest.py
      --trace-path artifacts/v14_panorama/mainline/regime_process_trace.csv
      --regime-audit src/engine/v11/resources/regime_audit.json
      --output-dir artifacts/kelly_ab

  kelly-parity:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    command: >
      python scripts/kelly_parity_backtest.py
      --output-dir artifacts/kelly_parity

  dashboard:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - ./data:/app/data
      - .env:/app/.env
    env_file:
      - .env
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
    command: streamlit run app.py --server.address 0.0.0.0

  lifecycle-test:
    image: qqq-monitor:py313
    build: .
    volumes:
      - .:/app
      - .env:/app/.env
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PRIOR_SEED_PATH=src/engine/v11/resources/v13_6_cold_start_seed.json
    command: python scripts/test_lifecycle_resilience.py
