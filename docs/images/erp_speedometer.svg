<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gaugeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B71C1C;stop-opacity:1" /> <!-- Deep Crimson -->
      <stop offset="35%" style="stop-color:#E67E22;stop-opacity:1" /> <!-- Burnt Orange -->
      <stop offset="65%" style="stop-color:#2E7D32;stop-opacity:1" /> <!-- Dark Forest -->
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" /> <!-- Golden Opportunity -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Gauge Background (Slate) -->
  <path d="M 50 160 A 150 150 0 0 1 350 160" fill="none" stroke="#ECEFF1" stroke-width="25" stroke-linecap="round"/>
  <!-- Gauge Color -->
  <path d="M 50 160 A 150 150 0 0 1 350 160" fill="none" stroke="url(#gaugeGradient)" stroke-width="25" stroke-linecap="round" filter="url(#shadow)"/>
  
  <!-- Critical Tick Marks -->
  <line x1="125" y1="55" x2="135" y2="65" stroke="#B71C1C" stroke-width="2" /> <!-- 2.5% -->
  <line x1="275" y1="55" x2="265" y2="65" stroke="#1B5E20" stroke-width="2" /> <!-- 4.5% -->

  <!-- Needle -->
  <g transform="translate(200, 160)">
    <g>
      <line x1="0" y1="0" x2="-130" y2="0" stroke="#263238" stroke-width="4" stroke-linecap="round" transform="rotate(-40)">
        <animateTransform 
          attributeName="transform" 
          type="rotate" 
          from="-45" to="-35" 
          dur="1s" 
          repeatCount="indefinite" 
          values="-42; -38; -42"
          keyTimes="0; 0.5; 1"
        />
      </line>
      <circle cx="0" cy="0" r="10" fill="#263238" />
      <circle cx="0" cy="0" r="4" fill="#CFD8DC" />
    </g>
  </g>
  
  <!-- Labels (Chinese) -->
  <text x="60" y="190" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="12" fill="#B71C1C" font-weight="bold">昂贵区 (ERP &lt; 2.5%)</text>
  <text x="260" y="190" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="12" fill="#1B5E20" font-weight="bold">黄金机会 (ERP &gt; 4.5%)</text>
  <text x="180" y="150" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="11" fill="#455A64">合理定价区</text>
  
  <text x="135" y="30" font-family="PingFang SC, Microsoft YaHei, Arial" font-weight="bold" font-size="18" fill="#1A237E">ERP 宏观定价仪表盘</text>
</svg>
