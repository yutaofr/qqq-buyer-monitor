<svg width="450" height="150" viewBox="0 0 450 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Professional Slate Background -->
  <rect x="25" y="60" width="400" height="30" rx="15" fill="#F5F7F9" stroke="#CFD8DC" stroke-width="1" />
  
  <!-- Zone Segments (Professional Muted Tones) -->
  <rect x="25" y="60" width="300" height="30" rx="15" fill="#FFECB3" opacity="0.4" /> <!-- Stress Zone (Amber) -->
  <rect x="25" y="60" width="180" height="30" rx="15" fill="#C8E6C9" opacity="0.6" /> <!-- Normal Zone (Forest Sage) -->
  
  <!-- Threshold Indicator (Deep Crimson) -->
  <g transform="translate(325, 0)">
    <line x1="0" y1="40" x2="0" y2="100" stroke="#B71C1C" stroke-width="4" stroke-dasharray="6,3" />
    
    <!-- Pulse Effect (Subtle Deep Crimson Overlay) -->
    <circle cx="0" cy="75" r="18" fill="#B71C1C" opacity="0.4">
      <animate attributeName="r" from="14" to="34" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" from="0.4" to="0" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="75" r="10" fill="#B71C1C" />
    
    <text x="10" y="30" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="16" fill="#B71C1C" font-weight="bold">🚨 650bps 熔断预警</text>
    <text x="10" y="50" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="12" fill="#B71C1C" font-style="italic">系统性流动性踩踏临界点</text>
  </g>
  
  <!-- Global Labels -->
  <text x="50" y="35" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="18" font-weight="bold" fill="#1A237E">信用利差加速器与事件视界</text>
  <text x="25" y="115" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="11" fill="#455A64">0 - 450bps (中性/安全) | 450 - 650bps (结构性紧缩) | 650bps+ (流动性休克)</text>
  
  <!-- Sub-label -->
  <text x="25" y="135" font-family="PingFang SC, Microsoft YaHei, Arial" font-size="12" fill="#1A237E">αS 加速度阀值 &gt; 15bps/10d 触发一票否决</text>
</svg>
