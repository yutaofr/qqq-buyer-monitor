<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQQ 晴雨表 - v8.2 决策仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .state-active { background-color: #064e3b; color: #ecfdf5; } /* Emerald 950 */
        .state-frozen { background-color: #1e3a8a; color: #eff6ff; } /* Blue 900 */
        .state-stale { background-color: #450a0a; color: #fef2f2; filter: grayscale(1); pointer-events: none; } /* Red 950 */
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body id="body" class="state-stale min-h-screen flex items-center justify-center p-4 font-sans transition-colors duration-700">
    <div class="max-w-md w-full glass rounded-[2.5rem] p-8 shadow-2xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-tighter">晴雨表</h1>
                <p id="version" class="text-[10px] tracking-[0.2em] opacity-40 uppercase">v8.2 Industrial</p>
            </div>
            <div id="indicator" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_12px_rgba(239,68,68,0.8)]"></div>
        </div>

        <!-- Main Logic -->
        <div id="content" class="space-y-10">
            <!-- Macro Regime -->
            <div class="space-y-2">
                <p class="text-[11px] font-bold uppercase tracking-[0.15em] opacity-50">当前宏观</p>
                <p id="regime" class="text-4xl font-black tracking-tight">载入中...</p>
                <p id="regime-desc" class="text-xs leading-relaxed opacity-70 italic font-medium"></p>
            </div>

            <!-- Existing Position (Exposure) -->
            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <p class="text-[11px] font-bold uppercase tracking-[0.15em] opacity-50">风险敞口 (存量)</p>
                    <p id="exposure" class="text-xl font-bold tracking-tight">--</p>
                </div>
                <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
                    <div id="exposure-bar" class="h-full bg-current opacity-40 transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p id="exposure-desc" class="text-[10px] opacity-50"></p>
            </div>

            <!-- Incremental Cash (Deployment) -->
            <div class="space-y-2">
                <p class="text-[11px] font-bold uppercase tracking-[0.15em] opacity-50">入场节奏 (增量)</p>
                <p id="deploy" class="text-2xl font-black tracking-tight">--</p>
                <p id="deploy-desc" class="text-[10px] leading-relaxed opacity-50"></p>
            </div>
        </div>

        <!-- Meta Footer -->
        <div class="mt-12 pt-6 border-t border-white/5 space-y-3">
            <div class="flex justify-between items-center text-[10px] tracking-wider opacity-30">
                <span class="font-bold">数据置信度</span>
                <span id="fidelity" class="font-black uppercase">UNKNOWN</span>
            </div>
            <div class="flex justify-between items-center text-[10px] tracking-wider opacity-30">
                <span>计算时间 (UTC)</span>
                <span id="calc-at">--:--</span>
            </div>
            <div class="flex justify-between items-center text-[10px] tracking-wider opacity-60 font-bold">
                <span>下次预计更新</span>
                <span id="expires-at">--:--</span>
            </div>
        </div>

        <!-- Stale Warning -->
        <div id="stale-msg" class="hidden mt-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-center">
            <p class="text-[10px] font-black text-red-400 tracking-widest">物理链路中断 - 信号失效</p>
        </div>
    </div>

    <script>
        const DEV_JSON = './status.json';
        
        function getProgressWidth(band) {
            const match = band.match(/(\d+)-(\d+)%/);
            return match ? match[2] + '%' : '0%';
        }

        async function updateDashboard() {
            const body = document.getElementById('body');
            const indicator = document.getElementById('indicator');
            const staleMsg = document.getElementById('stale-msg');

            try {
                const res = await fetch(DEV_JSON + '?t=' + Date.now());
                if (!res.ok) throw new Error("Fetch failed");
                const data = await res.json();
                
                const now = new Date();
                const expiresAt = new Date(data.meta.expires_at_utc);
                
                if (now > expiresAt) throw new Error("Signal Expired");

                body.classList.remove('state-stale');
                staleMsg.classList.add('hidden');

                const state = data.meta.market_state;
                if (state === 'ACTIVE') {
                    body.className = 'state-active min-h-screen flex items-center justify-center p-4 font-sans transition-colors duration-700';
                    indicator.className = 'w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_15px_rgba(52,211,153,0.8)] pulse';
                } else {
                    body.className = 'state-frozen min-h-screen flex items-center justify-center p-4 font-sans transition-colors duration-700';
                    indicator.className = 'w-3 h-3 rounded-full bg-blue-400 shadow-[0_0_15px_rgba(96,165,250,0.8)]';
                }

                // Render Content
                document.getElementById('regime').textContent = data.signal.regime;
                document.getElementById('regime-desc').textContent = data.signal.regime_desc;
                document.getElementById('exposure').textContent = data.signal.exposure_band;
                document.getElementById('exposure-bar').style.width = getProgressWidth(data.signal.exposure_band);
                document.getElementById('exposure-desc').textContent = data.signal.exposure_desc;
                document.getElementById('deploy').textContent = data.signal.deploy_rhythm;
                document.getElementById('deploy-desc').textContent = data.signal.deploy_desc;
                document.getElementById('fidelity').textContent = data.signal.fidelity;
                
                document.getElementById('calc-at').textContent = data.meta.calculated_at_utc.replace('T', ' ').replace('Z', '');
                document.getElementById('expires-at').textContent = expiresAt.toLocaleString('zh-CN', { hour12: false });

            } catch (e) {
                console.error("Dashboard Error:", e);
                body.className = 'state-stale min-h-screen flex items-center justify-center p-4 font-sans';
                indicator.className = 'w-3 h-3 rounded-full bg-red-600';
                staleMsg.classList.remove('hidden');
                document.getElementById('regime').textContent = "系统停摆";
                document.getElementById('regime-desc').textContent = "无法获取实时信号，请检查网络或联系管理员。";
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 300000);
    </script>
</body>
</html>
