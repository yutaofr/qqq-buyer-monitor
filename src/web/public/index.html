<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQQ 晴雨表 - Probabilistic Target-Beta 仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .state-active { background-color: #09090b; color: #f8fafc; }
        .state-frozen { background-color: #09090b; color: #f8fafc; }
        .state-locked { background-color: #09090b; color: #f8fafc; }
        .state-active .glass { background: rgba(15, 23, 42, 0.4); border-color: rgba(16, 185, 129, 0.2); } 
        .state-frozen .glass { background: rgba(15, 23, 42, 0.4); border-color: rgba(139, 92, 246, 0.2); }
        .state-locked .glass { background: rgba(15, 23, 42, 0.4); border-color: rgba(239, 68, 68, 0.2); }
        .state-stale { background-color: #09090b; color: #94a3b8; filter: grayscale(1); }
        .glass { backdrop-filter: blur(30px); border: 1.5px solid rgba(255, 255, 255, 0.05); }
        .text-ghost { opacity: 0.1; filter: blur(0.5px); }
        #insights-panel { max-height: 0; overflow: hidden; opacity: 0; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        #insights-panel.open { max-height: 2500px; margin-top: 1.5rem; opacity: 1; }
    </style>
</head>
<body id="body" class="state-stale min-h-screen flex items-center justify-center p-3 font-sans transition-colors duration-700">
    <div class="max-w-[390px] w-full glass rounded-[3rem] p-6 shadow-2xl transition-all duration-700">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black tracking-tighter text-white">晴雨表</h1>
            <div id="indicator" class="w-2.5 h-2.5 rounded-full bg-red-500"></div>
        </div>

        <div id="content" class="space-y-6 text-center">
            <div>
                <p class="text-[9px] font-bold uppercase tracking-[0.2em] opacity-40 text-slate-400">当前制度 (Regime)</p>
                <p id="regime" class="text-3xl font-black tracking-tight text-white">--</p>
            </div>
            
            <div class="factor-card p-5 rounded-[2.5rem] bg-white/[0.03] border border-white/[0.05]">
                <p class="text-[9px] font-black uppercase tracking-[0.2em] opacity-50 text-emerald-400">Beta 建议 (Advisory)</p>
                <p id="exposure" class="text-5xl font-black tracking-tighter text-white">--</p>
            </div>

            <div class="grid grid-cols-2 gap-3 text-left">
                <div class="p-3 rounded-2xl bg-white/[0.02] border border-white/[0.03]">
                    <p class="text-[8px] font-bold opacity-30 uppercase">信息熵</p>
                    <p id="entropy" class="text-lg font-black text-emerald-400">--</p>
                </div>
                <div class="p-3 rounded-2xl bg-white/[0.02] border border-white/[0.03]">
                    <p class="text-[8px] font-bold opacity-30 uppercase">执行状态</p>
                    <p id="deploy" class="text-lg font-black text-blue-400">--</p>
                </div>
            </div>
        </div>

        <div class="flex flex-row gap-3 mt-8">
            <button onclick="toggleInsights()" class="flex-1 py-3 rounded-2xl bg-white/[0.03] border border-white/[0.05] text-[9px] font-bold uppercase tracking-[0.3em] opacity-30 hover:opacity-100 transition-opacity">
                决策详情 (Audit)
            </button>
            <a href="https://github.com/yutaofr/qqq-buyer-monitor/wiki/V11-%22Entropy%22-%E6%A6%82%E7%8E%87%E5%86%B3%E7%AD%96%E5%A4%96%E9%AA%A8%E9%AA%BC%E7%94%A8%E6%88%B7%E6%89%8B%E5%86%8C" 
               target="_blank" 
               class="flex-1 flex items-center justify-center py-3 rounded-2xl bg-white/[0.03] border border-white/[0.05] text-[9px] font-bold uppercase tracking-[0.3em] opacity-30 hover:opacity-100 transition-opacity text-white no-underline">
                运行手册 (Wiki)
            </a>
        </div>

        <div id="insights-panel" class="space-y-6">
            <div class="p-4 rounded-2xl bg-white/[0.02] border border-white/[0.05] space-y-4">
                <div class="flex flex-col items-center">
                    <p class="text-[8px] opacity-30 uppercase font-bold mb-2 tracking-widest">Macro Tree</p>
                    <div class="flex flex-wrap justify-center gap-2">
                        <span class="text-[8px] px-1.5 py-0.5 text-ghost">末端 (LATE_CYCLE)</span>
                        <span class="text-[8px] px-1.5 py-0.5 text-ghost">中期平稳 (MID_CYCLE)</span>
                        <span class="text-[8px] px-1.5 py-0.5 text-ghost">休克 (BUST)</span>
                    </div>
                </div>
            </div>
            <div class="text-[9px] opacity-20 font-mono break-all" id="debug-path"></div>
        </div>

        <div class="mt-8 pt-6 border-t border-white/[0.05] space-y-2 text-[9px] tracking-wider opacity-30 text-slate-400 uppercase font-bold">
            <div class="flex justify-between"><span>数据源</span><span id="data-source" class="text-red-500 font-black">WAITING...</span></div>
            <div class="flex justify-between"><span>计算时间</span><span id="calc-at">--</span></div>
        </div>
    </div>

    <script>
        const PROD_BLOB_URL = 'https://rtmr1b9ayzxiugfu.public.blob.vercel-storage.com/status.json'; 

        function toggleInsights() { document.getElementById('insights-panel').classList.toggle('open'); }

        async function updateDashboard() {
            const body = document.getElementById('body');
            const sourceLabel = document.getElementById('data-source');
            try {
                // FORCE CLOUD ONLY - NO FALLBACK TO STALE LOCAL
                const res = await fetch(PROD_BLOB_URL + '?t=' + Date.now(), { 
                    method: 'GET',
                    mode: 'cors',
                    cache: 'no-store'
                });
                
                if (!res.ok) throw new Error("Fetch Error: " + res.status);
                const data = await res.json();
                
                body.classList.remove('state-stale');
                body.className = data.signal.lock_active ? 'state-locked min-h-screen flex items-center justify-center p-3 font-sans transition-colors duration-700' : 'state-active min-h-screen flex items-center justify-center p-3 font-sans transition-colors duration-700';
                sourceLabel.textContent = "CLOUD_SYNCED";
                sourceLabel.className = "text-emerald-500 font-black";

                document.getElementById('regime').textContent = data.signal.regime;
                document.getElementById('exposure').textContent = data.signal.target_beta.toFixed(2) + 'x';
                document.getElementById('entropy').textContent = data.signal.v11_entropy.toFixed(3);
                document.getElementById('deploy').textContent = data.signal.deploy_rhythm;
                document.getElementById('calc-at').textContent = data.meta.calculated_at_utc;
                document.getElementById('debug-path').textContent = data.signal.decision_path;

                const labels = document.querySelectorAll('.text-ghost');
                labels.forEach(l => {
                    if (data.signal.regime.toUpperCase().includes(l.textContent.toUpperCase())) {
                        l.className = 'text-[8px] px-1.5 py-0.5 rounded bg-emerald-400/20 text-emerald-400 font-bold opacity-100';
                    }
                });

            } catch (e) {
                console.error(e);
                sourceLabel.textContent = "SYNC_ERROR";
                document.getElementById('regime').textContent = "ERROR: " + e.message;
            }
        }
        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
